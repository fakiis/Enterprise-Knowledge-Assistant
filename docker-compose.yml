version: '3.8'

services:
  db:
    image: ankane/pgvector
    container_name: eka_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: .
      dockerfile: ./src/EnterpriseKnowledgeAssistant.Api/Dockerfile
    container_name: eka_api
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=eka;Username=postgres;Password=postgres
    ports:
      - "5050:8080"

volumes:
  pgdata: